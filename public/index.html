<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Value engine · legacy view</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0f14;
        --panel: #121822;
        --text: #e8edf4;
        --muted: #8b98a8;
        --accent: #4cc38a;
        --border: #223042;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
      }
      header {
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }
      h1 {
        font-size: 1.1rem;
        margin: 0;
        font-weight: 600;
      }
      .pill {
        font-size: 0.8rem;
        padding: 0.2rem 0.6rem;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
      }
      .pill.ok {
        border-color: #1f4d35;
        color: var(--accent);
      }
      main {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        padding: 1rem 1.5rem 2rem;
      }
      @media (max-width: 900px) {
        main {
          grid-template-columns: 1fr;
        }
      }
      section {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1rem;
        min-height: 200px;
      }
      h2 {
        margin: 0 0 0.75rem;
        font-size: 0.95rem;
        color: var(--muted);
        font-weight: 600;
      }
      pre {
        margin: 0;
        font-size: 0.78rem;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
        color: #d1dae6;
      }
      footer {
        padding: 0 1.5rem 1.5rem;
        color: var(--muted);
        font-size: 0.8rem;
      }
      a {
        color: #7ab8ff;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Value betting engine</h1>
      <div style="display: flex; align-items: center; gap: 0.75rem">
        <a href="/app/" style="font-size: 0.85rem">Open SportyBet dashboard (React) →</a>
        ·
        <a href="/dashboard.html" style="font-size: 0.85rem">Legacy HTML</a>
        <div id="status" class="pill">loading…</div>
      </div>
    </header>
    <main>
      <section>
        <h2>Recent signals (50)</h2>
        <pre id="signals">—</pre>
      </section>
      <section>
        <h2>Opportunities (30)</h2>
        <pre id="opps">—</pre>
      </section>
    </main>
    <footer>
      Health: <a href="/health">/health</a> · API:
      <a href="/api/summary">/api/summary</a> (rate limited) ·
      <a href="/execution.html">execution</a>
    </footer>
    <script>
      const FETCH_TIMEOUT_MS = 15000;
      async function tick() {
        const ctrl = new AbortController();
        const t = setTimeout(() => ctrl.abort(), FETCH_TIMEOUT_MS);
        try {
          const r = await fetch('/api/summary', { signal: ctrl.signal });
          const j = await r.json();
          const st = document.getElementById('status');
          const ing = j.ingest || {};
          let label = '';
          let ok = false;
          if (ing.dropsPollActive) {
            ok = !!ing.lastPollOk;
            label =
              ing.lastPollOk === false
                ? 'Drops poll (last failure)'
                : ing.lastPollAtIso
                  ? 'Drops poll · last OK ' +
                    ing.lastPollAtIso.slice(11, 19) +
                    ' UTC · new ' +
                    (ing.lastPollDropCount ?? 0)
                  : 'Drops poll starting…';
          } else if (j.sseConnected) {
            ok = true;
            label = 'SSE connected';
          } else {
            label = 'SSE reconnecting…';
          }
          st.textContent = label;
          st.className = 'pill' + (ok ? ' ok' : '');
          document.getElementById('signals').textContent = JSON.stringify(
            j.snapshot.signals,
            null,
            2,
          );
          document.getElementById('opps').textContent = JSON.stringify(
            j.snapshot.opportunities,
            null,
            2,
          );
        } catch (e) {
          const msg =
            e && e.name === 'AbortError'
              ? 'API timed out (' + FETCH_TIMEOUT_MS / 1000 + 's) — is the server running?'
              : 'API error';
          document.getElementById('status').textContent = msg;
        } finally {
          clearTimeout(t);
        }
      }
      tick();
      setInterval(tick, 2000);
    </script>
  </body>
</html>
